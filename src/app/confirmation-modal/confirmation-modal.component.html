<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3 class="modal-title">{{ title }}</h3>
            <button class="close-button" *ngIf="!isProgressMode" (click)="onCancel()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="modal-body" *ngIf="!isProgressMode">
            <p>{{ message }}</p>
        </div>

        <div class="modal-body progress-body" *ngIf="isProgressMode">
            <div class="progress-spinner" aria-hidden="true"></div>
            <p class="progress-message" *ngIf="message?.trim()">{{ message }}</p>
            <div class="progress-track" *ngIf="showProgressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" [attr.aria-valuenow]="streamProgressPercent" aria-label="Progreso en curso">
                <span class="progress-indeterminate" [style.width.%]="streamProgress"></span>
                <span class="progress-percent" *ngIf="streamingPhase !== 'idle'">{{ streamProgressPercent }}%</span>
            </div>

            <!-- Indicador de fase: pensando o generando -->
            <div class="stream-phase-bar" *ngIf="streamingPhase !== 'idle'">
                <span class="stream-phase-dot" [class.thinking]="streamingPhase === 'thinking'" [class.generating]="streamingPhase === 'generating'"></span>
                <span class="stream-phase-text">{{ streamingPhaseLabel }}</span>
            </div>

            <!-- Vista previa en vivo: títulos de casos detectados -->
            <div class="stream-cases-preview" *ngIf="streamingCaseTitles.length > 0">
                <div class="stream-cases-header">
                    <span class="stream-cases-count">{{ streamingCaseTitles.length }} caso{{ streamingCaseTitles.length !== 1 ? 's' : '' }} identificado{{ streamingCaseTitles.length !== 1 ? 's' : '' }}…</span>
                </div>
                <ul class="stream-cases-list">
                    <li *ngFor="let title of streamingCaseTitles; let i = index" class="stream-case-item">
                        <span class="stream-case-num">{{ i + 1 }}</span>
                        <span class="stream-case-title">{{ title }}</span>
                    </li>
                </ul>
            </div>

            <!-- Hint estático mientras no hay tokens aún -->
            <p class="progress-hint" *ngIf="streamingPhase === 'idle' && progressHint?.trim()">{{ progressHint }}</p>
        </div>

        <div class="modal-footer" *ngIf="!isProgressMode">
            <button class="btn-cancel" (click)="onCancel()">{{ cancelText }}</button>
            <button class="btn-confirm btn-primary"
                (click)="onConfirm()">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
