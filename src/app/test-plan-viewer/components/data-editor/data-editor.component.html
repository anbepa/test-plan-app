<div class="editor-shell">
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="tool-group">
            <span class="group-label">RESALTAR FILA</span>
            <div class="color-swatches">
                <button *ngFor="let c of highlightColors; let i = index"
                    class="swatch-btn"
                    [class.swatch-clear]="c.value === 'transparent'"
                    [style.background]="c.value === 'transparent' ? '#fff' : c.value"
                    [class.active]="selectedColor === c.value"
                    [title]="c.name"
                    (click)="selectedColor = c.value">
                    <svg *ngIf="c.value === 'transparent'" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <!-- Tooltip hint -->
            <div class="hint-wrap" title="Haz clic en la franja izquierda para pintar la fila">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </div>
        </div>

        <div class="tool-gap"></div>

        <div class="tool-group">
            <label class="check-label">
                <input type="checkbox" [(ngModel)]="hasHeader"> Encabezado
            </label>
        </div>
    </div>

    <div class="editor-viewport" #tableScrollContainer (scroll)="onTableScroll()">
        <!-- Ghost element that defines the total scrollable height -->
        <div class="scroll-height-ghost" [style.height.px]="localData.length * ROW_HEIGHT">

            <!-- Table window that follows the scroll position -->
            <div class="table-window" [style.transform]="'translateY(' + topSpacerHeight + 'px)'">
                <table>
                    <tbody>
                        <tr *ngFor="let row of virtualRows; trackBy: trackByFn"
                            [class.is-header-row]="hasHeader && row.index === 0"
                            [style.background-color]="localRowColors[row.index]">

                            <td class="paint-strip" (click)="applyColorToRow(row.index)"
                                [title]="'Pintar fila ' + (row.index + 1)">
                            </td>

                            <td *ngFor="let cell of row.data; let c = index; trackBy: trackByFn"
                                [class.cell-numeric]="!( hasHeader && row.index === 0) && isNumericColumn(c)">
                                <input type="text" [(ngModel)]="localData[row.index][c]" class="cell-editor-input"
                                    [class.input-numeric]="!(hasHeader && row.index === 0) && isNumericColumn(c)" />
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="loading-overlay" *ngIf="isLoading">
            <div class="loading-content">
                <div class="spinner"></div>
                <span>Cargando datos...</span>
            </div>
        </div>
    </div>

    <!-- Footer actions -->
    <div class="editor-footer">
        <button class="btn-cancel" (click)="onCancel()">Cancelar</button>
        <button class="btn-save" (click)="onSave()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Guardar Todo
        </button>
    </div>
</div>
