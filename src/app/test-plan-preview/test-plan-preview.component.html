<div class="preview-page-container">
    <div class="page-topbar">
        <div class="breadcrumb-row">
            <button type="button" (click)="goToPlansList()" class="breadcrumb-button">← Lista de Planes</button>
            <span class="breadcrumb-separator">/</span>
            <button type="button" (click)="goToPlanDetail()" class="breadcrumb-button breadcrumb-link">Detalle del Plan</button>
            <span class="breadcrumb-separator">/</span>
            <button type="button" (click)="goToCurrentPage()" class="breadcrumb-button breadcrumb-current">Previsualizar</button>
        </div>
        <div class="topbar-actions">

            <!-- Copiar: icono con feedback visual -->
            <button (click)="copyToClipboard()" class="btn-copy" [class.btn-copy-done]="copiedToClipboard" [title]="copiedToClipboard ? 'Copiado' : 'Copiar al portapapeles'">
                <!-- Icono portapapeles -->
                <svg *ngIf="!copiedToClipboard" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px;display:block">
                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                </svg>
                <!-- Icono check verde -->
                <svg *ngIf="copiedToClipboard" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px;display:block">
                    <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
                </svg>
            </button>

            <!-- Exportar: dropdown -->
            <div class="export-dropdown" (keydown.escape)="closeExportMenu()">
                <button class="btn-export-trigger" (click)="toggleExportMenu()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.75 2.75a.75.75 0 00-1.5 0v8.614L6.295 8.235a.75.75 0 10-1.09 1.03l4.25 4.5a.75.75 0 001.09 0l4.25-4.5a.75.75 0 00-1.09-1.03l-2.955 3.129V2.75z" />
                        <path d="M3.5 12.75a.75.75 0 00-1.5 0v2.5A2.75 2.75 0 004.75 18h10.5A2.75 2.75 0 0018 15.25v-2.5a.75.75 0 00-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z" />
                    </svg>
                    Exportar
                    <svg class="chevron" [class.chevron-open]="exportMenuOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                    </svg>
                </button>

                <div class="export-menu" *ngIf="exportMenuOpen">
                    <!-- PDF desde word-exporter -->
                    <div class="export-menu-item-wrapper export-item-pdf">
                        <app-word-exporter
                            [testPlanTitle]="testPlan?.title || ''"
                            [repositoryLink]="testPlan?.repository_link || ''"
                            [outOfScopeContent]="testPlan?.out_of_scope || ''"
                            [strategyContent]="testPlan?.strategy || ''"
                            [limitationsContent]="testPlan?.limitations || ''"
                            [assumptionsContent]="testPlan?.assumptions || ''"
                            [teamContent]="testPlan?.team || ''"
                            [huList]="huList">
                        </app-word-exporter>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="preview-content-wrapper">
        <div *ngIf="isLoading" class="loading-state">
            <div class="spinner"></div>
            <p>Cargando previsualización...</p>
        </div>

        <div *ngIf="errorMessage" class="error-state">
            <p>{{ errorMessage }}</p>
            <button (click)="goBack()" class="button-secondary">Volver al listado</button>
        </div>

        <div *ngIf="!isLoading && !errorMessage" class="document-preview">
            <div class="paper-sheet" [innerHTML]="previewHtmlContent"></div>
        </div>
    </div>
</div>
